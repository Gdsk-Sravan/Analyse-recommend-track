name: Weekly Summary

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: false
        # Phase W-3 (2026-07-03): default changed from 'manual' → 'scheduled'
        default: "scheduled"
        type: choice
        options:
          - "manual"
          - "scheduled"

      fresh_start:
        description: "Phase C7c FRESH START — ignore old trade_tracker.json + confidence_history.json + weekly_metrics.json this run. Set back to false after."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  actions: read

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests numpy openpyxl

      # Fallback: if the xlsx / JSON files are not yet committed to the repo,
      # pull the last artifact from main.yml. Once PERSIST_STATE_TO_REPO=true
      # is set on the evening job, these files live in git and this step is
      # a no-op safety net.
      - name: Download tracker artifact (fallback if git copies missing)
        if: ${{ hashFiles('recommendation_tracker.xlsx', 'trade_tracker.json', 'confidence_history.json') == '' }}
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: main.yml
          name: recommendation-tracker
          path: .
          workflow_conclusion: success

      - name: Run weekly summary
        run: python weekly_summary_job.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADE_TRACKER_V2_FILE: trade_tracker.json
          CONF_HISTORY_FILE: confidence_history.json
          TRACKER_XLSX: recommendation_tracker.xlsx
          SCHEDULED_RUN: ${{ github.event.inputs.run_mode == 'scheduled' && 'true' || 'false' }}
          # Phase C7c: FRESH_START skips loading old state (still runs, but
          # produces a clean report without WoW deltas).
          FRESH_START: ${{ github.event.inputs.fresh_start || 'false' }}
          # Phase C7e: persistent week-over-week metrics store.
          WEEKLY_METRICS_FILE: weekly_metrics.json

      - name: Commit weekly factor summary back to repo (scheduled runs only)
        if: ${{ github.event.inputs.run_mode == 'scheduled' }}
        run: |
          set -e
          if [ ! -f recommendation_tracker.xlsx ]; then
            echo "[INFO] No tracker file to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Phase C7e: weekly_metrics.json is the week-over-week deltas store
          # — must be committed so next week's run can compute deltas.
          # Phase W (2026-07-03): also commit run_health.json for cross-workflow
          # staleness detection.
          files=(recommendation_tracker.xlsx weekly_metrics.json run_health.json)
          existing=()
          for f in "${files[@]}"; do [ -e "$f" ] && existing+=("$f"); done
          if [ ${#existing[@]} -eq 0 ]; then
            echo "[INFO] Nothing to commit"
            exit 0
          fi
          git add "${existing[@]}"
          if git diff --cached --quiet; then
            echo "[INFO] No changes to commit"
          else
            git commit -m "chore: weekly factor summary [skip ci]"
            git push
            echo "[INFO] Weekly factor summary committed"
          fi

      # ── Phase W-2 (2026-07-03): failure Telegram alert ──
      - name: Notify Telegram on failure (Phase W-2)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/notify_telegram.py --text \
            "🚨 weekly_summary FAILED on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

