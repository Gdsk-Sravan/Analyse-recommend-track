name: Research Analytics

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: false
        default: "manual"
        type: choice
        options:
          - "manual"
          - "scheduled"

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance openpyxl pandas numpy python-dotenv

      - name: Download recommendation tracker Excel from scanner
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: main.yml
          name: recommendation-tracker
          path: .
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Run research analytics job
        env:
          TRACKER_XLSX: recommendation_tracker.xlsx
          SCHEDULED_RUN: ${{ github.event.inputs.run_mode == 'scheduled' && 'true' || 'false' }}
        run: python research_job.py

      - uses: actions/upload-artifact@v4
        with:
          name: research-report
          path: recommendation_tracker.xlsx
          retention-days: 90
