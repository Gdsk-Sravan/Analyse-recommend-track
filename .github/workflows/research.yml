name: Research Analytics

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: false
        # Phase W-3 (2026-07-03): default changed from 'manual' → 'scheduled'
        default: "scheduled"
        type: choice
        options:
          - "manual"
          - "scheduled"

      fresh_start:
        description: "Phase C7c FRESH START — skip research this run only. Set back to false immediately after."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  actions: read

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance openpyxl pandas numpy python-dotenv requests

      # Fallback: if the xlsx is not yet committed to the repo, try to pull
      # the last artifact from main.yml. Once PERSIST_STATE_TO_REPO=true kicks
      # in, the xlsx will already be in the checkout and this step becomes a
      # no-op safety net.
      - name: Download recommendation tracker Excel (fallback if git copy missing)
        if: ${{ hashFiles('recommendation_tracker.xlsx') == '' }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: main.yml
          name: recommendation-tracker
          path: .
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Run research analytics job
        env:
          TRACKER_XLSX: recommendation_tracker.xlsx
          SCHEDULED_RUN: ${{ github.event.inputs.run_mode == 'scheduled' && 'true' || 'false' }}
          # Phase C7c: FRESH_START skips the research build on the reset run.
          FRESH_START: ${{ github.event.inputs.fresh_start || 'false' }}
          # Phase C7e: min-N gate + delivery/sector cache freshness inputs
          MIN_SAMPLE_N: ${{ vars.MIN_SAMPLE_N || '5' }}
          SECTOR_RANK_HISTORY_FILE: sector_rank_history.json
        run: python research_job.py

      - uses: actions/upload-artifact@v4
        with:
          name: research-report
          path: recommendation_tracker.xlsx
          retention-days: 90

      - name: Commit research analytics back to repo (scheduled runs only)
        if: ${{ github.event.inputs.run_mode == 'scheduled' }}
        run: |
          set -e
          if [ ! -f recommendation_tracker.xlsx ]; then
            echo "[INFO] No tracker file to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Phase W (2026-07-03): also commit run_health.json for cross-workflow
          # staleness detection.
          files=(recommendation_tracker.xlsx run_health.json)
          existing=()
          for f in "${files[@]}"; do [ -e "$f" ] && existing+=("$f"); done
          [ ${#existing[@]} -eq 0 ] && exit 0
          git add "${existing[@]}"
          if git diff --cached --quiet; then
            echo "[INFO] No changes to commit"
          else
            git commit -m "chore: research analytics update [skip ci]"
            git push
            echo "[INFO] Research analytics committed"
          fi

      # ── Phase W-2 (2026-07-03): failure Telegram alert ──
      - name: Notify Telegram on failure (Phase W-2)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/notify_telegram.py --text \
            "🚨 research_analytics FAILED on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # ── Phase W-6 (2026-07-03): success Telegram summary ──
      - name: Notify Telegram on success (Phase W-6)
        if: ${{ success() && github.event.inputs.run_mode == 'scheduled' }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/notify_telegram.py --text \
            "✅ research_analytics OK — $(date -u +%Y-%m-%dT%H:%MZ)"

