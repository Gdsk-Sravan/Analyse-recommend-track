name: Recommendation Tracker

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: false
        default: "manual"
        type: choice
        options:
          - "manual"
          - "scheduled"

      fresh_start:
        description: "Phase C7c FRESH START — skip tracker update this run only (main.py owns the reset). Set back to false immediately after."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write   # needed for the git-commit-back step
  actions: read

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # keep GITHUB_TOKEN available for git push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance openpyxl pandas numpy python-dotenv

      # Fallback: if the xlsx is not yet committed to the repo, pull the last
      # artifact from main.yml. Once PERSIST_STATE_TO_REPO=true kicks in on the
      # evening job, the xlsx lives in git and this step is a no-op.
      - name: Download recommendation tracker Excel (fallback if git copy missing)
        if: ${{ hashFiles('recommendation_tracker.xlsx') == '' }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: main.yml
          name: recommendation-tracker
          path: .
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Run tracker job
        env:
          TRACKER_XLSX: recommendation_tracker.xlsx
          SCHEDULED_RUN: ${{ github.event.inputs.run_mode == 'scheduled' && 'true' || 'false' }}
          # Phase C7c: FRESH_START skips the tracker update on the reset run.
          FRESH_START: ${{ github.event.inputs.fresh_start || 'false' }}
          # Phase C7e: partial-exit stop sync reads trade_tracker.json to pick
          # up main.py's trailed stops after T1 hits.
          TRADE_TRACKER_V2_FILE: trade_tracker.json
        run: python tracker_job.py

      - uses: actions/upload-artifact@v4
        with:
          name: recommendation-tracker
          path: recommendation_tracker.xlsx
          retention-days: 90
          overwrite: true

      - name: Commit updated tracker back to repo (scheduled runs only)
        if: ${{ github.event.inputs.run_mode == 'scheduled' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # tracker_job.py appends to Daily Tracking + rebuilds Performance Summary
          # in the xlsx. Persist so the accumulator survives beyond artifact retention.
          # Phase C7e: also persist delivery_cache.json (fetch_delivery_cached
          # updates it on every ACTIVE position probe).
          files=(recommendation_tracker.xlsx trade_tracker.json delivery_cache.json)
          existing=()
          for f in "${files[@]}"; do [ -e "$f" ] && existing+=("$f"); done
          [ ${#existing[@]} -eq 0 ] && exit 0
          git add "${existing[@]}"
          git diff --cached --quiet || git commit -m "chore: tracker daily update [skip ci]" && git push
