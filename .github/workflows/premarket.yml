name: Pre-Market Brief

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: false
        default: "manual"
        type: choice
        options:
          - "manual"
          - "scheduled"

jobs:
  premarket:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Download tracker artifact (if available)
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: main.yml
          name: recommendation-tracker
          path: .
          workflow_conclusion: success

      - name: Run pre-market brief
        run: python premarket_job.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADE_TRACKER_V2_FILE: trade_tracker.json
          SCHEDULED_RUN: ${{ github.event.inputs.run_mode == 'scheduled' && 'true' || 'false' }}
