name: Stock Reviewer

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: false
        # Phase W-3 (2026-07-03): default changed from 'manual' → 'scheduled'.
        # cron-job.org triggers this workflow via the REST API without inputs,
        # so the DEFAULT is what actually runs. Manual override still available.
        default: "scheduled"
        type: choice
        options:
          - "manual"
          - "scheduled"

      force_price_refresh:
        description: "Force re-download latest prices (use after 4:30 PM IST for fresh EOD data)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      universe_mode:
        description: "Universe to scan"
        required: false
        default: "NSE_ALL"
        type: choice
        options:
          - "NSE_ALL"
          - "NIFTY_500"
          - "CUSTOM_LIST"

      force_universe_refresh:
        description: "Force NSE stock list refresh"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      force_full_cache_refresh:
        description: "Force full OHLCV cache rebuild"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_ai_second_pass:
        description: "Use AI second pass if key is available"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      persist_state_to_repo:
        description: "Commit portfolio state back to repo. Keep false for public repos."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      upload_private_reports:
        description: "Upload generated reports as artifact. Keep false for public repos."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      run_job:
        description: "Which job to run manually"
        required: false
        default: "evening"
        type: choice
        options:
          - "evening"
          - "morning"

      fresh_start:
        description: "Phase C7c FRESH START — wipe all state (tracker, history, gate memory) and start clean this run only. Set back to false immediately after."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  actions: read

concurrency:
  group: stock-reviewer-${{ github.ref }}-${{ github.event.inputs.run_job }}
  cancel-in-progress: false

# ═══════════════════════════════════════════════════════════════════════════════
# SHARED env — used by BOTH jobs
# ═══════════════════════════════════════════════════════════════════════════════
env:
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Kolkata"
  # true only when triggered by cron schedule — manual dispatch sets this false
  SCHEDULED_RUN: ${{ github.event.inputs.run_mode == 'scheduled' && 'true' || 'false' }}
  # Phase C7c: one-shot state reset — wipes tracker/history/gate memory + renames
  # old xlsx to .stale_<date>. All job scripts (main, tracker, research, weekly,
  # morning_check) read FRESH_START from env and short-circuit their state loaders.
  # IMPORTANT: set back to 'false' immediately after the reset run.
  FRESH_START: ${{ github.event.inputs.fresh_start || 'false' }}

  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  BUY_BOT_TOKEN:      ${{ secrets.BUY_BOT_TOKEN || '' }}
  BUY_CHAT_ID:        ${{ secrets.BUY_CHAT_ID || vars.BUY_CHAT_ID || '' }}
  TRACKER_BOT_TOKEN:  ${{ secrets.TRACKER_BOT_TOKEN || '' }}
  TRACKER_CHAT_ID:    ${{ secrets.TRACKER_CHAT_ID || vars.TRACKER_CHAT_ID || '' }}
  CAPITAL:            ${{ vars.CAPITAL || vars.TOTAL_CAPITAL || '500000' }}
  TRACKER_FILE:       tracker.json

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — EVENING PIPELINE (7 PM IST) — full analysis, Telegram BUY signals
  # Triggered by: schedule "30 13" OR workflow_dispatch (manual run)
  # ─────────────────────────────────────────────────────────────────────────────
  evening-pipeline:
    name: "Evening Pipeline — Full Analysis (7 PM IST)"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    # Run when: manually triggered  OR  it is the 13:30 UTC schedule
    if: ${{ github.event.inputs.run_job == 'evening' }}

    env:
      UNIVERSE_MODE:                ${{ github.event.inputs.universe_mode || vars.UNIVERSE_MODE || 'NSE_ALL' }}
      ENABLE_AI_SECOND_PASS:        ${{ github.event.inputs.enable_ai_second_pass || vars.ENABLE_AI_SECOND_PASS || 'true' }}
      # Phase C7f (2026-07-07): a FRESH_START run MUST commit the wiped xlsx
      # back to git, otherwise the next tracker.yml checkout pulls the
      # pre-wipe xlsx and appends onto stale rows. Force-on regardless of
      # what the user selected on the workflow_dispatch form.
      #
      # Phase Shadow-Persist-v2 (2026-07-10): SIMPLE, ENFORCED POLICY:
      #   • run_mode == 'scheduled' (cron-job.org)  → ALWAYS persist to git
      #   • run_mode == 'manual'    (Actions UI)    → NEVER  persist to git
      #   • fresh_start == 'true'                   → ALWAYS persist (override)
      #
      # The `persist_state_to_repo` form input is IGNORED for scheduled runs
      # (cron-job.org can no longer accidentally send "false" and lose state)
      # and IGNORED for manual runs (manual runs must never pollute git).
      # This is deliberate — the policy is "cron=production, manual=testing"
      # and the run_mode field is the single source of truth for that intent.
      #
      # Precedence (highest first):
      #   1. FRESH_START=true          → true (state wipe must persist)
      #   2. run_mode == 'scheduled'   → true (production nightly run)
      #   3. otherwise (manual)        → false (testing, keep git clean)
      PERSIST_STATE_TO_REPO:        ${{ (github.event.inputs.fresh_start == 'true' || github.event.inputs.run_mode == 'scheduled') && 'true' || 'false' }}
      UPLOAD_PRIVATE_REPORTS:       ${{ github.event.inputs.upload_private_reports || vars.UPLOAD_PRIVATE_REPORTS || 'false' }}
      SHOW_VERBOSE_LOGS:            ${{ vars.SHOW_VERBOSE_LOGS || 'false' }}

      PORTFOLIO_SOURCE:             ${{ vars.PORTFOLIO_SOURCE || 'MANUAL_ENV' }}
      AUTO_TRACK_RECOMMENDED_BUYS:  ${{ vars.AUTO_TRACK_RECOMMENDED_BUYS || 'false' }}
      AUTO_CLOSE_EXIT_SIGNALS:      ${{ vars.AUTO_CLOSE_EXIT_SIGNALS || 'false' }}
      MANUAL_PORTFOLIO_JSON:        ${{ secrets.MANUAL_PORTFOLIO_JSON || vars.MANUAL_PORTFOLIO_JSON || '[]' }}
 
      FORCE_UNIVERSE_REFRESH:       ${{ github.event.inputs.force_universe_refresh || 'false' }}
      FORCE_FULL_CACHE_REFRESH:     ${{ github.event.inputs.force_full_cache_refresh || 'false' }}
      FORCE_PRICE_REFRESH:          ${{ github.event.inputs.force_price_refresh || vars.FORCE_PRICE_REFRESH || 'false' }}

      FULL_CACHE_REFRESH_WEEKDAY:   ${{ vars.FULL_CACHE_REFRESH_WEEKDAY || '0' }}
      UNIVERSE_REFRESH_DAYS:        ${{ vars.UNIVERSE_REFRESH_DAYS || '7' }}
      FULL_CACHE_REFRESH_DAYS:      ${{ vars.FULL_CACHE_REFRESH_DAYS || '7' }}
      PRICE_CACHE_MAX_AGE_HOURS:    ${{ vars.PRICE_CACHE_MAX_AGE_HOURS || '18' }}
      INDEX_CACHE_MAX_AGE_HOURS:    ${{ vars.INDEX_CACHE_MAX_AGE_HOURS || '4' }}
      ACTIVE_HOLDING_CACHE_MAX_AGE_HOURS: ${{ vars.ACTIVE_HOLDING_CACHE_MAX_AGE_HOURS || '8' }}
      CANDIDATE_CACHE_MAX_AGE_HOURS: ${{ vars.CANDIDATE_CACHE_MAX_AGE_HOURS || '18' }}
      CACHE_DAILY_TRADABLE_LIMIT:   ${{ vars.CACHE_DAILY_TRADABLE_LIMIT || '1500' }}
      CACHE_HIGH_QUALITY_LIMIT:     ${{ vars.CACHE_HIGH_QUALITY_LIMIT || '250' }}
      CACHE_SMART_SKIP_ENABLED:     ${{ vars.CACHE_SMART_SKIP_ENABLED || 'true' }}
      CACHE_REQUIRE_CURRENT_DAILY_CANDLE: ${{ vars.CACHE_REQUIRE_CURRENT_DAILY_CANDLE || 'true' }}
      MARKET_DATA_READY_TIME_IST:   ${{ vars.MARKET_DATA_READY_TIME_IST || '18:15' }}
      NO_NEW_CANDLE_RETRY_HOURS:    ${{ vars.NO_NEW_CANDLE_RETRY_HOURS || '6' }}
      CACHE_SHOW_TOP_SKIPS:         ${{ vars.CACHE_SHOW_TOP_SKIPS || '12' }}

      NEWS_FETCH_TOP_N:             ${{ vars.NEWS_FETCH_TOP_N || '40' }}
      AI_NEWS_SYMBOL_LIMIT:         ${{ vars.AI_NEWS_SYMBOL_LIMIT || '15' }}
      NEWS_FETCH_MAX_WORKERS:       ${{ vars.NEWS_FETCH_MAX_WORKERS || '10' }}
      NEWS_FETCH_TIMEOUT_SECONDS:   ${{ vars.NEWS_FETCH_TIMEOUT_SECONDS || '8' }}
      NEWS_CACHE_TTL_HOURS:         ${{ vars.NEWS_CACHE_TTL_HOURS || '12' }}
      NEWS_MAX_HEADLINES_PER_SYMBOL: ${{ vars.NEWS_MAX_HEADLINES_PER_SYMBOL || '8' }}

      TOTAL_CAPITAL:                ${{ vars.TOTAL_CAPITAL || '200000' }}
      RISK_PER_TRADE_PCT:           ${{ vars.RISK_PER_TRADE_PCT || '1.0' }}
      MAX_PORTFOLIO_HEAT:           ${{ vars.MAX_PORTFOLIO_HEAT || '6.0' }}
      MAX_ACTIVE_POSITIONS:         ${{ vars.MAX_ACTIVE_POSITIONS || '8' }}
      MAX_POSITION_PCT:             ${{ vars.MAX_POSITION_PCT || '20' }}
      MAX_SECTOR_EXPOSURE_PCT:      ${{ vars.MAX_SECTOR_EXPOSURE_PCT || '30.0' }}
      MAX_SAME_SECTOR_POSITIONS:    ${{ vars.MAX_SAME_SECTOR_POSITIONS || '2' }}
      MAX_SAME_SECTOR_NEW_BUYS_PER_DAY: ${{ vars.MAX_SAME_SECTOR_NEW_BUYS_PER_DAY || '2' }}
      MIN_AVG_TRADED_VALUE:         ${{ vars.MIN_AVG_TRADED_VALUE || '5000000' }}
      MIN_AVG_VOLUME:               ${{ vars.MIN_AVG_VOLUME || '100000' }}
      MIN_REWARD_RISK:              ${{ vars.MIN_REWARD_RISK || '1.8' }}
      CORRELATION_LIMIT:            ${{ vars.CORRELATION_LIMIT || '0.78' }}
      TIME_EXIT_DAYS:               ${{ vars.TIME_EXIT_DAYS || '10' }}

      AI_PROVIDER:                  ${{ vars.AI_PROVIDER || 'groq' }}
      AI_ENABLED:                   ${{ vars.AI_ENABLED || 'true' }}
      AI_TIMEOUT_SECONDS:           ${{ vars.AI_TIMEOUT_SECONDS || '30' }}
      AI_MAX_RETRIES:               ${{ vars.AI_MAX_RETRIES || '2' }}
      AI_TOP_CANDIDATE_LIMIT:       ${{ vars.AI_TOP_CANDIDATE_LIMIT || '20' }}
      LOG_AI_IO:                    ${{ vars.LOG_AI_IO || 'true' }}

      GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL:     ${{ vars.GROQ_MODEL || 'llama-3.1-8b-instant' }}
      GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 || secrets.GROQ_API_KEY }}
      GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 || '' }}
      GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ─────────────────────────────────────────────────────────────────
      # Phase C7h (2026-07-10): PREFLIGHT SANITY CHECK
      # ─────────────────────────────────────────────────────────────────
      # Enforces the SIMPLE PERSIST POLICY (v2):
      #
      #   • run_mode='scheduled' → PERSIST=true   (cron = production)
      #   • run_mode='manual'    → PERSIST=false  (UI  = testing)
      #   • fresh_start='true'   → PERSIST=true   (wipe must commit)
      #
      # This step VERIFIES that the PERSIST_STATE_TO_REPO expression
      # in the job env resolved correctly against run_mode/fresh_start.
      # If the expression is ever edited incorrectly and drifts from
      # policy, this preflight fails FAST (30 seconds) instead of after
      # 45 minutes of wasted compute.
      #
      # Also catches the legacy footgun: FRESH_START=true + PERSIST=false
      # would wipe 27 state files, run for an hour, then throw the wipe
      # away when the runner is destroyed. This has burned real hours in
      # the past — now it's impossible.
      # ─────────────────────────────────────────────────────────────────
      - name: Preflight sanity check (persist policy enforcement)
        run: |
          set -e
          echo "═══════════════════════════════════════════════════════════"
          echo "  PREFLIGHT — evening pipeline persist-policy validation"
          echo "═══════════════════════════════════════════════════════════"
          echo "  run_mode              = ${{ github.event.inputs.run_mode }}"
          echo "  run_job               = ${{ github.event.inputs.run_job }}"
          echo "  fresh_start           = ${{ github.event.inputs.fresh_start }}"
          echo "  FRESH_START (env)     = ${FRESH_START:-<unset>}"
          echo "  PERSIST_STATE_TO_REPO = ${PERSIST_STATE_TO_REPO:-<unset>}"
          echo "  SCHEDULED_RUN         = ${SCHEDULED_RUN:-<unset>}"
          echo ""
          echo "  POLICY (v2, enforced):"
          echo "    scheduled cron  → persist=true   (production)"
          echo "    manual dispatch → persist=false  (testing)"
          echo "    fresh_start=true → persist=true  (override, wipe must commit)"
          echo ""

          # Compute the EXPECTED persist value from run_mode + fresh_start alone.
          expected_persist="false"
          if [ "${{ github.event.inputs.fresh_start }}" = "true" ]; then
            expected_persist="true"
          elif [ "${{ github.event.inputs.run_mode }}" = "scheduled" ]; then
            expected_persist="true"
          fi

          # ── FATAL 1: policy drift — env doesn't match expected ──
          if [ "${PERSIST_STATE_TO_REPO}" != "${expected_persist}" ]; then
            echo "❌ FATAL: policy drift detected!"
            echo ""
            echo "   Expected PERSIST_STATE_TO_REPO='${expected_persist}'"
            echo "   Actual   PERSIST_STATE_TO_REPO='${PERSIST_STATE_TO_REPO}'"
            echo ""
            echo "   Someone edited the PERSIST_STATE_TO_REPO expression in"
            echo "   main.yml and broke the v2 policy. Restore it to:"
            echo ""
            echo "     PERSIST_STATE_TO_REPO: \${{ (github.event.inputs.fresh_start == 'true' || github.event.inputs.run_mode == 'scheduled') && 'true' || 'false' }}"
            echo ""
            exit 1
          fi

          # ── FATAL 2: legacy fresh_start footgun (defensive, shouldn't fire) ──
          if [ "${FRESH_START}" = "true" ] && [ "${PERSIST_STATE_TO_REPO}" != "true" ]; then
            echo "❌ FATAL: FRESH_START=true but PERSIST_STATE_TO_REPO=${PERSIST_STATE_TO_REPO}"
            echo "   A fresh-start wipe cannot be discarded — this should be"
            echo "   impossible under v2 policy. main.yml expression is broken."
            exit 1
          fi

          # ── INFO: what will actually happen this run ──
          if [ "${PERSIST_STATE_TO_REPO}" = "true" ]; then
            echo "💾 PERSIST=TRUE — end-of-run will 'git commit + git push' the"
            echo "                  32 durable state files back to main branch."
          else
            echo "🧪 PERSIST=FALSE — manual/testing run, no git commits."
            echo "                   Results available in artifact zip only."
          fi
          echo ""

          # ── INFO: FRESH_START summary ──
          if [ "${FRESH_START}" = "true" ]; then
            echo "🧹 FRESH_START ACTIVE — main.py will wipe 27 state files:"
            echo "   9 renamed to .stale_$(date +%Y-%m-%d) (shadow xlsx/csv, portfolio_state.csv, etc.)"
            echo "   18 deleted outright (trackers, gate memory, caches, run_health, etc.)"
            echo "   11 preserved (portfolio.json, user configs, universe metadata)"
            echo ""
            echo "   ⚠️  REMEMBER: unset FRESH_START after this run — leaving it on"
            echo "                 will wipe again tomorrow."
            echo ""
          fi

          echo "═══════════════════════════════════════════════════════════"
          echo "  ✅ Preflight passed — pipeline will proceed"
          echo "═══════════════════════════════════════════════════════════"

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: |
            cache
            news_cache
            nse_all_symbols.csv
            sector_cache.json
            fundamentals_cache.json
            universe_cache_meta.json
            weekly_job_meta.json
            tradable_universe.csv
            qualified_stocks.csv
            low_volatility_stocks.txt
            tracker.json
            trade_tracker.json
            confidence_history.json
            gate_memory.json
            watchlist_persist.json
            regime_calibration.json
            delivery_cache.json
            sector_rank_history.json
            weekly_metrics.json
            vix_history_cache.json
            reject_watch.json
            reject_outcome_log.csv
            run_health.json
            tracking_workbook.xlsx
            shadow_master.xlsx
            shadow_trades.csv
            shadow_report.xlsx
            reports/archive/**
            # ── observation-dataset (2026-07-13): tracking store + append-only logs ──
            # These MUST survive across runs so the weekly_review_job idempotency
            # check (skip if (iso_week, category) already present) works, and so
            # the daily-snapshot append log accumulates across evenings.
            results/tracking_store.json
            results/tracking_events.jsonl
            results/weekly_review_history.jsonl
            results/daily_snapshots.jsonl
            .fresh_start_marker
          key: stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-
            stock-reviewer-data-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Phase W-4 (2026-07-03): FRESH_START safety valve ────────────────
      # Refuse a FRESH_START if we already wiped state in the last 2 days
      # (prevents accidentally repeated wipes from workflow reruns).
      - name: Guard FRESH_START (Phase W-4)
        if: ${{ env.FRESH_START == 'true' }}
        run: |
          python scripts/pipeline_health.py guard-fresh-start \
            --workflow evening --window-days 2 \
            --write-alert-file .fresh_start_alert.txt
          rc=$?
          if [ $rc -eq 2 ]; then
            echo "::error::FRESH_START refused — recent wipe already recorded in run_health.json"
            python scripts/notify_telegram.py --stdin --prefix "🛑" < .fresh_start_alert.txt || true
            exit 1
          fi

      - name: Preflight
        run: |
          echo "=== EVENING PIPELINE ==="
          python3 --version
          echo "Capital: ${CAPITAL}"
          echo "Universe: ${UNIVERSE_MODE}"
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then echo "WARNING: TELEGRAM_BOT_TOKEN missing"; fi
          if [ -z "${BUY_BOT_TOKEN}" ]; then echo "INFO: BUY_BOT_TOKEN not set — BUY channel disabled"; fi
          if [ -z "${GROQ_API_KEY_1}" ]; then echo "WARNING: GROQ_API_KEY_1 missing"; fi
          echo "Preflight complete"

      - name: Write portfolio from secret
        if: env.MANUAL_PORTFOLIO_JSON != '' && env.MANUAL_PORTFOLIO_JSON != '[]'
        run: |
          echo "Writing portfolio.json from MANUAL_PORTFOLIO_JSON secret..."
          echo "$MANUAL_PORTFOLIO_JSON" > portfolio.json
          echo "Portfolio loaded: $(python3 -c "import json; d=json.load(open('portfolio.json')); print(len(d), 'holdings')" 2>/dev/null || echo 'parse error')"

      - name: Run evening pipeline
        run: python3 main.py

      # ── 2026-07-13 · A1 PURGE ──
      # tracker_job.py, shadow_master_job.py, and the dedicated
      # shadow_master.xlsx → Telegram step are DELETED. The evening pipeline
      # (main.py) now writes ONE canonical workbook (tracking_workbook.xlsx)
      # via the observation-dataset block and sends it to Telegram itself.
      # No secondary job runs on top of main.py anymore.

      - name: Run reject-outcome follow-up (Phase N-2)
        continue-on-error: true
        run: |
          if [ -f "reject_watch.json" ]; then
            python scripts/reject_followup.py \
              --watch reject_watch.json \
              --out reject_outcome_log.csv
          else
            echo "[INFO] reject_watch.json not yet populated — skipping"
          fi

      # ── 2026-07-13 · A1 PURGE ──
      # The former "Run shadow master job" step (python shadow_master_job.py
      # --mode scan-and-update) and the "Send shadow_master.xlsx to Telegram"
      # dedicated step are DELETED. main.py's observation-dataset block now
      # writes tracking_workbook.xlsx and sends it to Telegram inline. If that
      # inline Telegram send fails on the runner (e.g. transient 5xx), the
      # artifact upload step below still preserves the workbook for 90 days.
      # Belt-and-suspenders: fall back to a fresh Telegram send here iff the
      # workbook exists AND we're on a scheduled run — this only fires when
      # main.py's inline send returned non-zero (i.e. workbook on disk but
      # never delivered).
      - name: Send tracking_workbook.xlsx to Telegram (fallback, scheduled only)
        if: ${{ always() && env.SCHEDULED_RUN == 'true' && hashFiles('tracking_workbook.xlsx') != '' }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          today=$(date +%Y-%m-%d)
          weekday=$(date +%A)
          size_bytes=$(stat -c%s tracking_workbook.xlsx 2>/dev/null || echo 0)
          size_human=$(numfmt --to=iec --suffix=B "$size_bytes" 2>/dev/null || echo "${size_bytes}B")
          caption=$(printf '%b' "📊 Tracking Workbook — ${today} (${weekday})\nSize: ${size_human}\nObservation-dataset workbook — 16 sheets (stage / setup / summary).")
          python scripts/notify_telegram_document.py tracking_workbook.xlsx --caption "$caption"
          echo "tracking_workbook.xlsx fallback send rc=$?"

      - name: Show summary
        if: always()
        run: |
          echo "Generated files:"
          ls -1 *.txt *.csv *.json 2>/dev/null || true
          if [ -f error_log.txt ]; then head -20 error_log.txt; fi

      - name: Save cache (includes tracker.json for morning job)
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            cache
            news_cache
            nse_all_symbols.csv
            sector_cache.json
            fundamentals_cache.json
            universe_cache_meta.json
            weekly_job_meta.json
            tradable_universe.csv
            qualified_stocks.csv
            low_volatility_stocks.txt
            tracker.json
            trade_tracker.json
            confidence_history.json
            gate_memory.json
            watchlist_persist.json
            regime_calibration.json
            delivery_cache.json
            sector_rank_history.json
            weekly_metrics.json
            vix_history_cache.json
            reject_watch.json
            reject_outcome_log.csv
            run_health.json
            tracking_workbook.xlsx
            shadow_master.xlsx
            shadow_trades.csv
            shadow_report.xlsx
            reports/archive/**
            # ── observation-dataset (2026-07-13): tracking store + append-only logs ──
            # Mirror of the Restore-cache list above. If you add a file there,
            # add it here too, or the next run's cache restore will miss it.
            results/tracking_store.json
            results/tracking_events.jsonl
            results/weekly_review_history.jsonl
            results/daily_snapshots.jsonl
            .fresh_start_marker
          key: stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload recommendation tracker Excel
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: recommendation-tracker
          # Phase C7h (2026-07-10): include every stateful file so the day-30
          # calibration analyst gets a self-contained zip. Mirrors the git
          # persist file list — if you add a file there, add it here too.
          path: |
            tracking_workbook.xlsx
            shadow_master.xlsx
            shadow_trades.csv
            shadow_report.xlsx
            shadow_report_weekly.xlsx
            recommendation_tracker.xlsx
            portfolio_state.csv
            portfolio_status.csv
            trade_journal.csv
            reject_outcome_log.csv
            telegram_daily.csv
            price_fetch_failures.jsonl
            tradable_dropouts.jsonl
            trade_tracker.json
            trade_tracker_v2.json
            tracker.json
            confidence_history.json
            gate_memory.json
            watchlist_persist.json
            regime_calibration.json
            reject_watch.json
            sector_rank_history.json
            delivery_cache.json
            fundamentals_cache.json
            sector_cache.json
            weekly_metrics.json
            telegram_prev_state.json
            intraday_snapshots.json
            run_health.json
            last_known_good.json
            last_tradable.json
            portfolio.json
            # ── observation-dataset (2026-07-13): tracking store + append-only logs ──
            results/tracking_store.json
            results/tracking_events.jsonl
            results/weekly_review_history.jsonl
            results/daily_snapshots.jsonl
          retention-days: 90
          if-no-files-found: warn

      - name: Upload reports (if enabled)
        if: ${{ always() && env.UPLOAD_PRIVATE_REPORTS == 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: evening-pipeline-output
          retention-days: 14
          if-no-files-found: ignore
          path: |
            *.csv
            *.txt
            *.json

      - name: Persist portfolio state (if enabled)
        if: ${{ always() && env.PERSIST_STATE_TO_REPO == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Portfolio state + daily tracking accumulator files.
          # The xlsx + trade_tracker.json + confidence_history.json + gate_memory.json
          # MUST be committed back so the daily append-only history survives across runs
          # (artifacts eventually roll off after 90d; git is the durable store).
          #
          # Phase C7h (2026-07-10): expanded to include EVERY file wiped by
          # FRESH_START, so a fresh-start commit actually reflects the wipe
          # in the repo (git rm honours the deletion). If it's in main.py's
          # _fresh_rename_files or _fresh_delete_files, it MUST be here.
          files=(
            # ── xlsx workbooks ──
            tracking_workbook.xlsx
            shadow_master.xlsx
            shadow_report.xlsx
            shadow_report_weekly.xlsx
            recommendation_tracker.xlsx
            # ── csv accumulators ──
            portfolio_state.csv
            portfolio_status.csv
            trade_journal.csv
            shadow_trades.csv
            reject_outcome_log.csv
            telegram_daily.csv
            # ── jsonl append-only logs ──
            price_fetch_failures.jsonl
            tradable_dropouts.jsonl
            # ── observation-dataset (2026-07-13): tracking store + append-only logs ──
            # Feed the WEEKLY_REVIEW and WEEKLY_SUMMARY sheets; MUST persist to git
            # so the weekly_review_job idempotency check works across runs (and so
            # a Monday run can see "already appended" once Tuesday runs).
            results/tracking_store.json
            results/tracking_events.jsonl
            results/weekly_review_history.jsonl
            results/daily_snapshots.jsonl
            # ── main.py state (loaded, in-memory guarded) ──
            trade_tracker.json
            trade_tracker_v2.json
            tracker.json
            confidence_history.json
            gate_memory.json
            watchlist_persist.json
            regime_calibration.json
            reject_watch.json
            # ── caches (delivery_cache committed for warm start; others are .gitignored) ──
            # NOTE (2026-07-10 hotfix): fundamentals_cache.json and sector_cache.json
            # are in .gitignore (lines 38-39) and CANNOT be `git add`-ed without -f.
            # They ARE regenerated cheaply every run, so we intentionally do NOT persist
            # them here. They still ship in the artifact zip (upload step below) for the
            # day-30 analyst. Adding them to this list crashes the entire persist step.
            sector_rank_history.json
            delivery_cache.json
            # ── auxiliary summaries ──
            weekly_metrics.json
            telegram_prev_state.json
            intraday_snapshots.json
            run_health.json
            last_known_good.json
            last_tradable.json
            # ── user-owned config (safe to commit — never wiped) ──
            portfolio.json
            # ── coordination marker ──
            .fresh_start_marker
          )
          # Phase C7f (2026-07-07): on a FRESH_START run, main.py renamed
          # stateful files to <name>.stale_<date>. Do NOT commit those stale
          # siblings to git — they would pollute the durable store and
          # eventually get restored by a downstream job's checkout.
          #
          # Phase C7h (2026-07-10): expanded to cover ALL rename patterns
          # emitted by the full state scrubber (main.py _fresh_rename_files).
          if [ "$FRESH_START" = "true" ]; then
            echo "[FRESH_START] Purging .stale_* siblings from git tracking"
            _stale_patterns=(
              'shadow_master.xlsx.stale_*'
              'shadow_report.xlsx.stale_*'
              'shadow_report_weekly.xlsx.stale_*'
              'recommendation_tracker.xlsx.stale_*'
              'shadow_trades.csv.stale_*'
              'portfolio_state.csv.stale_*'
              'telegram_daily.csv.stale_*'
              'price_fetch_failures.jsonl.stale_*'
              'tradable_dropouts.jsonl.stale_*'
            )
            for _pat in "${_stale_patterns[@]}"; do
              git ls-files "$_pat" 2>/dev/null | xargs -r git rm -f || true
            done
          fi
          # Phase C7g (2026-07-10): if main.py's startup deleted a stale
          # .fresh_start_marker (non-consuming peek design), also remove it
          # from git tracking so the repo doesn't carry a dead marker.
          if [ ! -f .fresh_start_marker ] && git ls-files --error-unmatch .fresh_start_marker >/dev/null 2>&1; then
            echo "[FRESH_START] Removing stale .fresh_start_marker from git tracking"
            git rm -f .fresh_start_marker || true
          fi
          # Only stage files that actually exist AND are not gitignored.
          # Phase C7h-hotfix (2026-07-10): filter via `git check-ignore` so a
          # future .gitignore addition never crashes the persist step again.
          # `git check-ignore -q <f>` exits 0 if IGNORED, 1 if NOT IGNORED.
          existing=()
          skipped_ignored=()
          for f in "${files[@]}"; do
            if [ -e "$f" ]; then
              if git check-ignore -q "$f" 2>/dev/null; then
                skipped_ignored+=("$f")
              else
                existing+=("$f")
              fi
            fi
          done
          if [ ${#skipped_ignored[@]} -gt 0 ]; then
            echo "[persist] Skipped gitignored files (still in artifact zip): ${skipped_ignored[*]}"
          fi
          # Phase I (2026-07-09): also stage the shadow-report archive dir so
          # daily dated xlsx copies (reports/archive/shadow_report_YYYY-MM-DD.xlsx)
          # get committed. The dir itself is stable; only new files trigger
          # a real diff.
          if [ -d reports/archive ]; then
            existing+=("reports/archive")
          fi
          [ ${#existing[@]} -eq 0 ] && exit 0
          git add "${existing[@]}"
          git diff --cached --quiet || git commit -m "chore: update portfolio state + tracker [skip ci]" && git push

      # ── Phase W-6 (2026-07-03): success Telegram summary ──
      # Sends a one-line "evening OK" so silence == real failure over 24h.
      # Only on scheduled runs to avoid noise on manual debugging runs.
      - name: Notify Telegram on success (Phase W-6)
        if: ${{ success() && env.SCHEDULED_RUN == 'true' }}
        continue-on-error: true
        run: |
          summary=$(python -c "
          import json
          try:
              d = json.load(open('run_health.json'))
              e = d.get('jobs', {}).get('evening', {})
              parts = []
              for k in ('buys','watchlist','tradable','regime','mode','last_success_utc'):
                  if k in e: parts.append(f'{k}={e[k]}')
              print(' | '.join(parts))
          except Exception as ex:
              print(f'(no health data: {ex})')
          ")
          python scripts/notify_telegram.py --text \
            "✅ evening_pipeline OK — $summary"

      # ── Phase W-2 (2026-07-03): failure Telegram alert ──
      - name: Notify Telegram on failure (Phase W-2)
        if: failure()
        run: |
          python scripts/notify_telegram.py --text \
            "🚨 evening_pipeline FAILED on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — MORNING CHECK (9:20 AM IST) — gap-open verdict for today's signals
  # Triggered by: schedule "50 3" ONLY — never by manual dispatch
  # ─────────────────────────────────────────────────────────────────────────────
  morning-check:
    name: "Morning Check — Gap-Open Verdict (9:20 AM IST)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Run when: manually with run_job=morning  OR  it is the 03:50 UTC schedule
    if: ${{ github.event.inputs.run_job == 'morning' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Phase C7d: morning kill-switch reads trade_tracker.json to compute
      # buys_paused verdict — must be restored alongside tracker.json.
      - name: Restore cache (to get last night's tracker.json + trade_tracker.json)
        uses: actions/cache/restore@v5
        with:
          path: |
            tracker.json
            trade_tracker.json
          key: stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-
            stock-reviewer-data-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install requests yfinance python-dotenv

      - name: Run morning gap-open check
        env:
          # Phase C7d: kill-switch inputs
          TRADE_TRACKER_V2_FILE: trade_tracker.json
          # Same env-var name as the pipeline (main.py) — morning_check now
          # reads CAPITAL first, then PORTFOLIO_CAPITAL, then TOTAL_CAPITAL.
          CAPITAL:               ${{ vars.CAPITAL || vars.TOTAL_CAPITAL || '500000' }}
          KS_MAX_CONSEC_LOSSES:  ${{ vars.KS_MAX_CONSEC_LOSSES || '3' }}
          KS_DAY_STOP_PCT:       ${{ vars.KS_DAY_STOP_PCT || '2.0' }}
          KS_WEEK_STOP_PCT:      ${{ vars.KS_WEEK_STOP_PCT || '3.0' }}
          KS_DD_HALVE_PCT:       ${{ vars.KS_DD_HALVE_PCT || '5.0' }}
          KS_DD_HALT_PCT:        ${{ vars.KS_DD_HALT_PCT || '10.0' }}
        run: python3 morning_check.py

      - name: Show result
        if: always()
        run: echo "Morning check complete at $(date)"

      # ── Phase W-2 (2026-07-03): failure Telegram alert ──
      # morning_check.py already sends its own kill-switch alerts; this covers
      # the case where the script itself crashes before it can send anything.
      - name: Notify Telegram on failure (Phase W-2)
        if: failure()
        run: |
          # requests may not be installed on this minimal job
          pip install requests -q || true
          python scripts/notify_telegram.py --text \
            "🚨 morning_check FAILED on ${{ github.ref_name }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
